[project]
name = "baseball-computer"
version = "0.1.0"
description = ""
requires-python = ">=3.12"
authors = [{ name = "David Roher", email = "david.roher@gmail.com" }]
dependencies = [
    "dbt-core~=1.10.0",
    "dbt-duckdb~=1.10.1",
    "duckdb~=1.5.2",
    "numpy>=1.26.4",
    "pandas>=2.2.1",
    "polars>=0.20.17",
    "pyarrow>=15.0.2",
    "statsmodels>=0.14.1",
    "recordlinkage>=0.16.0",
]

[dependency-groups]
dev = [
    "sqlfluff>=3.0.3",
    "sqlfluff-templater-dbt>=3.0.3",
    "ipykernel>=6.25.2",
    "boto3>=1.34.45",
    "ruamel.yaml>=0.18.5",
]
spikes-sqlmesh = [
    "sqlmesh>=0.234",
    "ibis-framework[duckdb]>=12.0",
    "polars>=1.31",
    "numba>=0.59",
]
spikes-bsl = [
    "boring-semantic-layer>=0.3.12",
    "ibis-framework[duckdb]>=11.0",
]
spikes-mf = [
    "dbt-metricflow",
]

[tool.uv]
package = false
conflicts = [
    [
        { group = "spikes-sqlmesh" },
        { group = "spikes-bsl" },
        { group = "spikes-mf" },
    ],
]
