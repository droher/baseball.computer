  description: 'Manager career index.

    '
  column_descriptions:
    id: Retrosheet personnel id.
    first_g: Date of first managed game.
    last_g: Date of last managed game.
  grain:
  - id
  audits:
  - - not_null
    - columns: (id)
  - - unique_values
    - columns: (id)
      condition: id IS NOT NULL
- name: biodata.relatives
  description: 'Player-family relationships graph.

    '
  column_descriptions:
    id1: First personnel id.
    relation: Relationship type (father, brother, etc.).
    id2: Second personnel id.
