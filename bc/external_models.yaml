- name: biodata.ejections
  description: 'Game ejections.

    '
  column_descriptions:
    game_id: 'Retrosheet game ID, A 12-character string structured as follows: - Chars 1-3: Home team ID - Chars 4-11: Date (YYYYMMDD) - Char 12: Game number (0 if only one game was played on that day) Example: MLN195607170'
    ejectee: Ejected personnel id.
    job: Role of ejectee (player, manager, coach).
    inning: -1 if pre-game.
