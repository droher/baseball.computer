- name: misc.bio
  description: 'Master bio reference for players, managers, coaches, and umpires.

    Modern data refreshed by upstream simple_files.py, kept in legacy

    lowercase column shape (player_id/last/first/...).

    '
  column_descriptions:
    player_id: Retrosheet personnel id.
  grain:
  - player_id
  audits:
  - - not_null
    - columns: (player_id)
  - - unique_values
    - columns: (player_id)
      condition: player_id IS NOT NULL
- name: misc.gamelog
  description: 'A truncated version of Retrosheet''s gamelog file. It includes only

    games prior to 1901 (for which box sores are generally not available).

    This is our only source of info for those games, so it does not conflict

    with any of the later data in the play-by-play.

    '
- name: misc.park
  description: 'Information about each ballpark.

    '
  columns:
    park_id: PARK_ID
  grain:
  - park_id
  audits:
  - - not_null
    - columns: (city, park_id)
  - - unique_values
    - columns: (park_id)
      condition: park_id IS NOT NULL
- name: misc.roster
  description: 'Contains one entry for any valid combination of year/team/player.

    The biographical information may conflict with the info in the `people`

    table, as handedness/names are not necessarily the same from year to year.

    '
  columns:
    player_id: PLAYER_ID
    bats: HAND
    throws: HAND
    team_id: TEAM_ID
  grain:
  - year
  - player_id
  - team_id
  audits:
  - - not_null
    - columns: (last_name, player_id, team_id, year)
- name: misc.schedule
  description: 'Information about the original scheduled slate of games. Each row

    represents an originally scheduled game. This will

    differ from the `game` table in cases of postponements.

    '
  columns:
    park_id: park_id
  column_descriptions:
    park_id: 'Retrosheet park ID, 3-character string which identifies the ballpark associated with this entity. See `stg_parks` for full park info.'
