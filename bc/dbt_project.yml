# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models
name: 'baseball_computer'
version: '0.0.1'
config-version: 2

# This setting configures which "profile" dbt uses for this project.
profile: 'bc'

# Note: dbt 1.10 errors if both `flags:` here and `config:` in profiles.yml
# are set. Repo has no source-freshness project hooks, so the new 1.10
# default (`source_freshness_run_project_hooks: true`) is behaviorally inert.
# When the user migrates the deprecated profiles.yml `config:` block, move
# the prefs here under `flags:`.

# These configurations specify where dbt should look for different types of files.
# The `model-paths` config, for example, states that models in this project can be
# found in the "models/" directory. You probably won't need to change these!
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"  # directory which will store compiled SQL files
clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"

models:
  baseball_computer:
    +materialized: table
    +schema: models
    intermediate:
      machine_learning:
        +enabled: false

seeds:
  baseball_computer:
    +schema: seeds

# Per-schema source parquet roots, consumed by `init_db` macro.
# Defaults below point to the local boxball-rs output dir.
# To pull from the published R2 bucket instead, override via `--vars` on the CLI:
#   dbt run-operation init_db --vars '{source_roots: {event: "https://data.baseball.computer/event", game: "https://data.baseball.computer/event", box_score: "https://data.baseball.computer/event", misc: "https://data.baseball.computer/misc", baseballdatabank: "https://data.baseball.computer/baseballdatabank"}}'
# `baseballdatabank` stays on R2 by default — boxball-rs does not produce it locally.
vars:
  source_roots:
    event: 'https://data.baseball.computer/event'
    game: 'https://data.baseball.computer/event'
    box_score: 'https://data.baseball.computer/event'
    misc: 'https://data.baseball.computer/misc'
    baseballdatabank: 'https://data.baseball.computer/baseballdatabank'
    biodata: 'https://data.baseball.computer/biodata'
