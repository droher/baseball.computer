version: 2

models:
  - name: stg_managers
    description: |
      Manager career index from biodata/managers0.csv. Replaces per-year
      manager files which the new fetcher does not mirror.

    columns:
      - name: person_id
        description: "Retrosheet personnel id (joins stg_bio.player_id)."
        tests:
          - not_null
          - unique
      - name: last_name
        description: ""
      - name: first_name
        description: ""
      - name: first_game_date
        description: "Date of first managed game."
      - name: last_game_date
        description: "Date of last managed game."
