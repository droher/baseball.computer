version: 2

models:
  - name: stg_umpires
    description: |
      Umpire career index from biodata/umpires0.csv. Replaces per-year
      `umpires/UMPIRES{YYYY}.txt` files which the new fetcher does not
      mirror.

    columns:
      - name: person_id
        description: "Retrosheet personnel id (joins stg_bio.player_id)."
        tests:
          - not_null
          - unique
      - name: last_name
        description: ""
      - name: first_name
        description: ""
      - name: first_game_date
        description: "Date of first umpired game."
      - name: last_game_date
        description: "Date of last umpired game."
