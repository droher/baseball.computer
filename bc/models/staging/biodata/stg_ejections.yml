version: 2

models:
  - name: stg_ejections
    description: |
      Game ejections. From biodata/ejections.csv.

    columns:
      - name: game_id
        description: "{{ doc('game_id') }}"
      - name: game_date
        description: ""
      - name: doubleheader_status
        description: ""
      - name: ejectee_id
        description: "Personnel id ejected."
      - name: ejectee_name
        description: ""
      - name: team_id
        description: ""
      - name: ejectee_role
        description: "P=player, M=manager, C=coach, etc."
      - name: umpire_id
        description: ""
      - name: umpire_name
        description: ""
      - name: inning
        description: "Inning of ejection (-1 if pre-game)."
      - name: reason
        description: ""
